// ─── LAYOUT ──────────────────────────────────────────────────────────────────
const CX = 2400, CY = 1800;
const positions = {};
const LEAF_GAP = 34;
const X_GAP_L2 = 260;
const X_GAP_L3 = 240;

function countLeaves(node) {
  if (!node.children || node.children.length === 0) return 1;
  return node.children.reduce((s, c) => s + countLeaves(c), 0);
}

function layoutTree() {
  positions['root'] = { x: CX, y: CY, side: 'root' };

  const l1Positions = {
    'ob':    { x: CX + 750, y: CY - 480 },
    'entst': { x: CX + 750, y: CY + 300 },
    'vgg':   { x: CX - 750, y: CY + 100 },
  };

  function layoutChildren(node, nodePos, side, xOff) {
    if (!node.children || node.children.length === 0) return;
    const totalLeaves = countLeaves(node);
    const totalHeight = totalLeaves * LEAF_GAP;
    let cursor = nodePos.y - totalHeight / 2;
    node.children.forEach(child => {
      const childLeaves = countLeaves(child);
      const childHeight = childLeaves * LEAF_GAP;
      const childY = cursor + childHeight / 2;
      cursor += childHeight;
      positions[child.id] = { x: nodePos.x + xOff, y: childY, side };
      const nextXOff = side === 'left' ? -X_GAP_L3 : X_GAP_L3;
      layoutChildren(child, positions[child.id], side, nextXOff);
    });
  }

  data.children.forEach(l1Node => {
    const pos = l1Positions[l1Node.id] || { x: CX, y: CY };
    positions[l1Node.id] = pos;
    const side = pos.x < CX ? 'left' : 'right';
    positions[l1Node.id].side = side;
    const xOff = side === 'left' ? -X_GAP_L2 : X_GAP_L2;
    layoutChildren(l1Node, pos, side, xOff);
  });
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
let transform = { x: 0, y: 0, scale: 0.35 };

function renderAll() {
  layoutTree();
  renderNodes();
  requestAnimationFrame(() => requestAnimationFrame(() => renderLines()));
}

const nodesDiv = document.getElementById('nodes');
const svg = document.getElementById('lines');

function renderNodes() {
  nodesDiv.innerHTML = '';
  function createNode(node) {
    const pos = positions[node.id];
    if (!pos) return;
    const side = pos.side || 'left';
    const el = document.createElement('div');
    el.className = `node ${node.level}${node.branch !== undefined ? ' branch-' + node.branch : ''}`;
    el.id = 'n-' + node.id;
    el.style.left = pos.x + 'px';
    el.style.top = pos.y + 'px';
    if (node.level === 'root') {
      el.style.transform = 'translate(-50%, -50%)';
    } else if (side === 'left') {
      el.style.transform = 'translate(-100%, -50%)';
    } else {
      el.style.transform = 'translate(0%, -50%)';
    }
    let label = node.label;
    if (node.sub) label += ` <span style="opacity:0.55;font-size:0.85em">${node.sub}</span>`;
    const inner = document.createElement('div');
    inner.className = 'node-inner';
    inner.innerHTML = label;
    inner.style.textAlign = (node.level === 'root') ? 'center' : side === 'left' ? 'right' : 'left';
    el.appendChild(inner);
    nodesDiv.appendChild(el);
    if (node.children) node.children.forEach(createNode);
  }
  createNode(data);
}

function renderLines() {
  svg.innerHTML = '';
  const colors = ['#7c3aed', '#2563eb', '#059669', '#db2777'];

  function getBoxEdge(nodeId, goingLeft) {
    const pos = positions[nodeId];
    if (!pos) return { x: 0, y: 0 };
    const el = document.getElementById('n-' + nodeId);
    if (!el) return { x: pos.x, y: pos.y };
    const inner = el.querySelector('.node-inner') || el;
    const w = inner.offsetWidth;
    const side = pos.side || 'left';
    let ex;
    if (side === 'root') {
      ex = goingLeft ? pos.x - w / 2 : pos.x + w / 2;
    } else if (side === 'left') {
      ex = goingLeft ? pos.x - w : pos.x;
    } else {
      ex = goingLeft ? pos.x : pos.x + w;
    }
    return { x: ex, y: pos.y };
  }

  function drawTree(node) {
    if (!node.children) return;
    node.children.forEach(child => {
      const fPos = positions[node.id];
      const tPos = positions[child.id];
      if (!fPos || !tPos) return;
      const color = child.branch !== undefined ? colors[child.branch % colors.length] : '#aaa';
      const opacity = child.level === 'l2' ? '0.45' : '0.25';
      const weight = child.level === 'l2' ? '1.4' : '0.9';
      const childSide = tPos.side || 'left';
      const goingLeft = childSide === 'left';
      const from = getBoxEdge(node.id, goingLeft);
      const to   = getBoxEdge(child.id, !goingLeft);
      const mx = (from.x + to.x) / 2;
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const d = `M ${from.x} ${from.y} C ${mx} ${from.y}, ${mx} ${to.y}, ${to.x} ${to.y}`;
      path.setAttribute('d', d);
      path.setAttribute('stroke', color);
      path.setAttribute('stroke-width', weight);
      path.setAttribute('fill', 'none');
      path.setAttribute('opacity', opacity);
      svg.appendChild(path);
      drawTree(child);
    });
  }
  drawTree(data);
}

function applyTransform() {
  const t = `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale})`;
  nodesDiv.style.transform = t;
  svg.style.transform = t;
  svg.style.transformOrigin = '0 0';
  nodesDiv.style.transformOrigin = '0 0';
}

window.addEventListener('load', () => {
  renderAll();
  transform.x = window.innerWidth / 2 - CX * transform.scale;
  transform.y = window.innerHeight / 2 - CY * transform.scale;
  applyTransform();
  document.fonts.ready.then(() => {
    requestAnimationFrame(() => requestAnimationFrame(() => renderLines()));
  });
});

// ─── INTERACTION ─────────────────────────────────────────────────────────────
let isDragging = false, lastX, lastY;

document.body.addEventListener('mousedown', e => {
  if (e.target.closest('.node') || e.target.closest('#info-panel') || e.target.closest('#controls')) return;
  isDragging = true;
  lastX = e.clientX; lastY = e.clientY;
  document.body.classList.add('dragging');
});
document.addEventListener('mousemove', e => {
  if (!isDragging) return;
  transform.x += e.clientX - lastX;
  transform.y += e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  applyTransform();
});
document.addEventListener('mouseup', () => {
  isDragging = false;
  document.body.classList.remove('dragging');
});

document.addEventListener('wheel', e => {
  e.preventDefault();
  if (e.ctrlKey) {
    const factor = 1 - e.deltaY * 0.008;
    const clampedFactor = Math.max(0.5, Math.min(2.0, factor));
    const mx = e.clientX, my = e.clientY;
    const newScale = Math.min(2.5, Math.max(0.1, transform.scale * clampedFactor));
    const scaleChange = newScale / transform.scale;
    transform.x = mx - (mx - transform.x) * scaleChange;
    transform.y = my - (my - transform.y) * scaleChange;
    transform.scale = newScale;
  } else {
    const multiplier = e.deltaMode === 0 ? 1 : e.deltaMode === 1 ? 20 : 300;
    transform.x -= e.deltaX * multiplier;
    transform.y -= e.deltaY * multiplier;
  }
  applyTransform();
}, { passive: false });

let lastTouchDist = null, lastTouchMidX = 0, lastTouchMidY = 0;
document.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; }
  else if (e.touches.length === 2) {
    isDragging = false;
    lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    lastTouchMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    lastTouchMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
  }
}, { passive: true });
document.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && isDragging) {
    transform.x += e.touches[0].clientX - lastX; transform.y += e.touches[0].clientY - lastY;
    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; applyTransform();
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    if (lastTouchDist) {
      const factor = dist / lastTouchDist;
      const newScale = Math.min(2.5, Math.max(0.1, transform.scale * factor));
      const scaleChange = newScale / transform.scale;
      transform.x = midX - (midX - transform.x) * scaleChange + (midX - lastTouchMidX);
      transform.y = midY - (midY - transform.y) * scaleChange + (midY - lastTouchMidY);
      transform.scale = newScale;
    }
    lastTouchDist = dist; lastTouchMidX = midX; lastTouchMidY = midY; applyTransform();
  }
}, { passive: false });
document.addEventListener('touchend', () => { isDragging = false; lastTouchDist = null; });

document.getElementById('zoomIn').addEventListener('click', () => { transform.scale = Math.min(2, transform.scale * 1.2); applyTransform(); });
document.getElementById('zoomOut').addEventListener('click', () => { transform.scale = Math.max(0.15, transform.scale * 0.8); applyTransform(); });
document.getElementById('zoomReset').addEventListener('click', () => {
  transform.scale = 0.35;
  transform.x = window.innerWidth / 2 - CX * transform.scale;
  transform.y = window.innerHeight / 2 - CY * transform.scale;
  applyTransform();
});

// ─── INFO PANEL ──────────────────────────────────────────────────────────────
const branchColors = ['#7c3aed', '#2563eb', '#059669', '#db2777'];
const panel = document.getElementById('info-panel');
const accent = document.getElementById('info-accent');
const infoTitle = document.getElementById('info-title');
const infoText = document.getElementById('info-text');
const infoQuestion = document.getElementById('info-question');

let clickMoved = false, mouseDownX = 0, mouseDownY = 0;
document.addEventListener('mousedown', e => { clickMoved = false; mouseDownX = e.clientX; mouseDownY = e.clientY; });
document.addEventListener('mousemove', e => {
  if (Math.hypot(e.clientX - mouseDownX, e.clientY - mouseDownY) > 5) clickMoved = true;
});

nodesDiv.addEventListener('click', e => {
  if (clickMoved) return;
  const nodeEl = e.target.closest('.node');
  if (!nodeEl) return;
  const id = nodeEl.id.replace('n-', '');
  const info = nodeInfo[id];
  if (!info) return;
  const branchClass = [...nodeEl.classList].find(c => c.startsWith('branch-'));
  const branchIdx = branchClass ? parseInt(branchClass.split('-')[1]) : -1;
  const color = branchIdx >= 0 ? branchColors[branchIdx] : '#a78bfa';
  accent.style.background = color;
  infoTitle.textContent = info.title;
  infoTitle.style.color = color;
  infoText.textContent = info.text;
  infoQuestion.textContent = info.question ? '💡 ' + info.question : '';
  infoQuestion.style.display = info.question ? 'block' : 'none';
  panel.classList.add('visible');
  e.stopPropagation();
});

document.getElementById('info-close').addEventListener('click', () => panel.classList.remove('visible'));
document.getElementById('canvas-wrap').addEventListener('click', e => {
  if (!e.target.closest('.node') && !clickMoved) panel.classList.remove('visible');
});
</script>
